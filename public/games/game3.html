<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Game 3 - Zahl raten</title>
</head>
<body>
  <h1>Zahl raten</h1>
  <p>Ich denke mir eine Zahl zwischen 1 und 100.</p>
  <input id="guess" type="number" min="1" max="100">
  <button id="check">Prüfen</button>
  <p id="msg"></p>
  <script>
    let secret = Math.floor(Math.random() * 100) + 1;
    const guessInput = document.getElementById('guess');
    const msg = document.getElementById('msg');
    document.getElementById('check').onclick = () => {
      const g = Number(guessInput.value);
      if (!g) return;
      if (g === secret) {
        msg.textContent = 'Richtig! Neue Zahl generiert.';
        secret = Math.floor(Math.random() * 100) + 1;
      } else if (g < secret) {
        msg.textContent = 'Zu klein!';
      } else {
        msg.textContent = 'Zu groß!';
      }
    };
  </script>
</body>
</html>
