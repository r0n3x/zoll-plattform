<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>LUDARA – Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="top-header">
    <div class="logo">LUDARA AI</div>
    <div class="login-box">
        <input type="text" id="login-email" placeholder="E-Mail">
        <input type="password" id="login-password" placeholder="Passwort">
        <button class="btn-blue" onclick="login()">Login</button>
        <a href="#" class="small-link" onclick="openRegister()">Jetzt registrieren</a>
        <a href="#" class="small-link">Passwort vergessen?</a>
    </div>
</header>

<nav class="main-nav">
    <a href="index.html" class="active">HOME</a>
    <a href="profile.html">PROFIL</a>
    <a href="news.html">ZOLL-NEWS</a>
    <a href="feed.html">COMMUNITY</a>
    <a href="hs.html">HS-CODES</a>
</nav>

<section class="hero">
    <div class="hero-text">
        <h1>Willkommen bei LUDARA</h1>
        <p>Deine Plattform für Zoll, Community und Automatisierung.</p>
    </div>
</section>

<section class="content-grid">
    <div class="left-column">
        <h2>Neueste Posts</h2>
        <div id="feed-container"></div>
    </div>

    <div class="right-column">
        <h2>Zoll-News</h2>
        <div id="news-container"></div>

        <h2>HS-Code Suche</h2>
        <div class="hs-search-box">
            <input id="hs-search" placeholder="HS Code oder Beschreibung">
            <button class="btn-blue" onclick="searchHS()">Suchen</button>
        </div>
        <div id="hs-results"></div>
    </div>
</section>

<footer class="footer">
    <p>© 2026 LUDARA AI – All Rights Reserved</p>
</footer>

<script src="js/app.js"></script>
</body>
</html>
