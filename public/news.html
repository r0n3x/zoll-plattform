<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Zoll News – LUDARA</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Zoll News</h1>
        <p class="subtitle">Automatisch aktualisierte Nachrichten vom deutschen Zoll</p>

        <div id="news-container" class="news-list"></div>
    </div>

    <script>
        async function loadNews() {
            const res = await fetch("/api/news");
            const news = await res.json();

            const container = document.getElementById("news-container");
            container.innerHTML = "";

            news.forEach(item => {
                const card = document.createElement("div");
                card.className = "news-card";

                card.innerHTML = `
                    <h2>${item.title}</h2>
                    <p class="date">${new Date(item.date).toLocaleDateString("de-DE")}</p>
                    <p>${item.description}</p>
                    <a href="${item.link}" target="_blank" class="btn">Weiterlesen</a>
                `;

                container.appendChild(card);
            });
        }

        loadNews();
    </script>
</body>
</html>
