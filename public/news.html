<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>LUDARA – News</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div>
        <img src="img/logo.png" alt="LUDARA ai Logo" class="logo-img">
      </div>
      <div class="sidebar-logo-text">
        <div class="sidebar-logo-title">LUDARA ai</div>
        <div class="sidebar-logo-sub">Zoll · HS-Codes · Community</div>
      </div>
    </div>

    <div>
      <div class="nav-section-title">Navigation</div>
      <nav class="nav-list">
        <a href="index.html" class="nav-link">
          <span class="icon">🏠</span><span>Home</span>
        </a>
        <a href="profile.html" class="nav-link">
          <span class="icon">👤</span><span>Profil</span>
        </a>
        <a href="feed.html" class="nav-link">
          <span class="icon">💬</span><span>Community</span>
        </a>
        <a href="news.html" class="nav-link active">
          <span class="icon">📰</span><span>News</span>
        </a>
        <a href="hs.html" class="nav-link">
          <span class="icon">🔍</span><span>HS-Codes</span>
        </a>
      </nav>
    </div>

    <div class="sidebar-footer">
      © LUDARA ai · 2026
    </div>
  </aside>

  <!-- MAIN AREA -->
  <div class="main-area">

    <!-- TOPBAR -->
    <header class="topbar">
      <div class="topbar-left">News</div>
      <div class="topbar-right">
        <div class="topbar-login">
          <input type="text" id="login-email" placeholder="E-Mail oder Benutzername" />
          <input type="password" id="login-password" placeholder="Passwort" />
          <button class="btn-primary" onclick="login()">Login</button>
        </div>
        <div class="topbar-links">
          <a href="#" onclick="openRegister()">Jetzt registrieren</a>
          <a href="#">Passwort vergessen?</a>
        </div>
      </div>
    </header>

    <!-- CONTENT -->
    <main class="content">

      <section>

        <!-- NEWS HEADER -->
        <div class="card">
          <div class="card-header">
            <div>
              <div class="card-title">Zoll‑News</div>
              <div class="card-subtitle">Automatisch aktualisierte Nachrichten vom deutschen Zoll</div>
            </div>
          </div>

          <!-- KATEGORIEN -->
          <div style="padding: 16px;">
            <div class="category-bar">
              <button class="category-btn active" data-cat="all">Alle</button>
              <button class="category-btn" data-cat="zoll">Zoll</button>
              <button class="category-btn" data-cat="wirtschaft">Wirtschaft</button>
              <button class="category-btn" data-cat="eu">EU</button>
            </div>
          </div>

          <!-- NEWS LIST -->
          <div id="news-list" class="list">
            <div class="list-item">
              <div class="list-item-title">News werden geladen...</div>
            </div>
          </div>
        </div>

      </section>

    </main>
  </div>
</div>

<script src="js/app.js"></script>

<script>
async function loadNews() {
  const container = document.getElementById("news-list");
  container.innerHTML = "<div class='list-item'><div class='list-item-title'>Lade News...</div></div>";

  try {
    const res = await fetch("/api/news");
    const news = await res.json();

    if (!news.length) {
      container.innerHTML = "<div class='list-item'><div class='list-item-title'>Keine News verfügbar.</div></div>";
      return;
    }

    renderNews(news);

  } catch (err) {
    console.error(err);
    container.innerHTML = "<div class='list-item'><div class='list-item-title'>Fehler beim Laden der News.</div></div>";
  }
}

function renderNews(news) {
  const container = document.getElementById("news-list");
  const activeCat = document.querySelector(".category-btn.active").dataset.cat;

  const filtered = news.filter(n => {
    if (activeCat === "all") return true;
    if (!n.category) return false;
    return n.category === activeCat;
  });

  if (!filtered.length) {
    container.innerHTML = "<div class='list-item'><div class='list-item-title'>Keine News in dieser Kategorie.</div></div>";
    return;
  }

  let html = "";
  filtered.forEach(item => {
    html += `
      <div class="list-item">
        <div class="list-item-title">${item.title}</div>
        <div class="list-item-meta">${new Date(item.date).toLocaleDateString("de-DE")}</div>
        <div class="list-item-desc">${item.description}</div>
        <a href="${item.link}" target="_blank" class="btn-primary" style="margin-top:10px; display:inline-block;">
          Weiterlesen
        </a>
      </div>
    `;
  });

  container.innerHTML = html;
}

document.addEventListener("DOMContentLoaded", () => {
  loadNews();

  document.querySelectorAll(".category-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".category-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      loadNews();
    });
  });
});
</script>

<style>
.category-bar {
  display: flex;
  gap: 10px;
}

.category-btn {
  padding: 8px 14px;
  border-radius: 8px;
  border: none;
  background: #e5e7eb;
  cursor: pointer;
  font-size: 14px;
}

.category-btn.active {
  background: #0094FF;
  color: white;
}
</style>

</body>
</html>
