<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>LUDARA – News</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="app-shell">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div>
        <img src="img/ludara-logo.png" alt="LUDARA ai Logo" />
      </div>
      <div class="sidebar-logo-text">
        <div class="sidebar-logo-title">LUDARA ai</div>
        <div class="sidebar-logo-sub">Zoll · HS-Codes · Community</div>
      </div>
    </div>

    <div>
      <div class="nav-section-title">Navigation</div>
      <nav class="nav-list">
        <a href="index.html" class="nav-link">
          <span class="icon">🏠</span><span>Home</span>
        </a>
        <a href="profile.html" class="nav-link">
          <span class="icon">👤</span><span>Profil</span>
        </a>
        <a href="feed.html" class="nav-link">
          <span class="icon">💬</span><span>Community</span>
        </a>
        <a href="news.html" class="nav-link active">
          <span class="icon">📰</span><span>News</span>
        </a>
        <a href="hs.html" class="nav-link">
          <span class="icon">🔍</span><span>HS-Codes</span>
        </a>
      </nav>
    </div>

    <div class="sidebar-footer">
      © LUDARA ai · 2026
    </div>
  </aside>

  <div class="main-area">
    <header class="topbar">
      <div class="topbar-left">News</div>
      <div class="topbar-right">
        <div class="topbar-login">
          <input type="text" id="login-email" placeholder="E-Mail oder Benutzername" />
          <input type="password" id="login-password" placeholder="Passwort" />
          <button class="btn-primary" onclick="login()">Login</button>
        </div>
        <div class="topbar-links">
          <a href="#" onclick="openRegister()">Jetzt registrieren</a>
          <a href="#">Passwort vergessen?</a>
        </div>
      </div>
    </header>

    <main class="content-full">
      <div class="card">
        <div class="card-header">
          <div>
            <div class="card-title">Zoll- & HS-Code-News</div>
            <div class="card-subtitle">Aktuelle Meldungen aus deiner Datenquelle</div>
          </div>
        </div>
        <div id="news-list" class="list">
          <div class="list-item">
            <div class="news-item-title">Noch keine News geladen</div>
            <div class="news-item-meta">Die News können per API aus deinem Backend geladen werden.</div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="js/app.js"></script>
<script>
async function loadNews() {
  try {
    const res = await fetch("/api/news");
    if (!res.ok) return;
    const data = await res.json();
    const container = document.getElementById("news-list");
    if (!data.length) {
      container.innerHTML = "<div class='list-item'><div class='news-item-meta'>Keine News vorhanden.</div></div>";
      return;
    }
    let html = "";
    data.forEach(item => {
      html += `
        <div class="list-item">
          <div class="news-item-title">${item.title}</div>
          <div class="news-item-meta">${item.date} · ${item.source}</div>
          <div>${item.summary}</div>
        </div>
      `;
    });
    container.innerHTML = html;
  } catch (err) {
    console.error(err);
  }
}

loadNews();
</script>
</body>
</html>
