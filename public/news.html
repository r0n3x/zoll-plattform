<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>LUDARA – News</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="img/logo.png" class="logo-img" />
      <div class="sidebar-logo-text">
        <div class="sidebar-logo-title">LUDARA ai</div>
        <div class="sidebar-logo-sub">Zoll · HS-Codes · Community</div>
      </div>
    </div>

    <div>
      <div class="nav-section-title">Navigation</div>
      <nav class="nav-list">
        <a href="index.html" class="nav-link"><span class="icon">🏠</span>Home</a>
        <a href="profile.html" class="nav-link"><span class="icon">👤</span>Profil</a>
        <a href="feed.html" class="nav-link"><span class="icon">💬</span>Community</a>
        <a href="news.html" class="nav-link active"><span class="icon">📰</span>News</a>
        <a href="hs.html" class="nav-link"><span class="icon">🔍</span>HS‑Codes</a>
      </nav>
    </div>

    <div class="sidebar-footer">© LUDARA ai · 2026</div>
  </aside>

  <!-- MAIN AREA -->
  <div class="main-area">

    <!-- TOPBAR MIT VISUELLEM TICKER -->
    <header class="topbar">

      <div class="news-ticker">
        <div id="ticker-wrapper">
          <div id="ticker-content"></div>
        </div>
      </div>

      <div class="topbar-right">
        <div class="topbar-login">
          <input type="text" id="login-email" placeholder="E-Mail oder Benutzername" />
          <input type="password" id="login-password" placeholder="Passwort" />
          <button class="btn-primary" onclick="login()">Login</button>
        </div>
        <div class="topbar-links">
          <a href="#" onclick="openRegister()">Jetzt registrieren</a>
          <a href="#">Passwort vergessen?</a>
        </div>
      </div>

    </header>

    <!-- CONTENT -->
    <main class="content">

      <section>

        <!-- NEWS HEADER -->
        <div class="card">
          <div class="card-header">
            <div class="card-title">Zoll‑News</div>
            <div class="card-subtitle">Automatisch aktualisierte Nachrichten</div>
          </div>

          <!-- KATEGORIEN -->
          <div style="padding: 16px;">
            <div class="category-bar">
              <button class="category-btn active" data-cat="all">Alle</button>
              <button class="category-btn" data-cat="zoll">Zoll</button>
              <button class="category-btn" data-cat="wirtschaft">Wirtschaft</button>
              <button class="category-btn" data-cat="eu">EU</button>
              <button class="category-btn" data-cat="politik">Politik</button>
            </div>
          </div>

          <!-- NEWS LIST -->
          <div id="news-list" class="list">
            <div class="list-item"><div class="list-item-title">News werden geladen...</div></div>
          </div>
        </div>

      </section>

    </main>
  </div>
</div>

<script src="js/app.js"></script>

<!-- LOAD NEWS -->
<script>
async function loadNews() {
  const container = document.getElementById("news-list");
  container.innerHTML = "<div class='list-item'><div class='list-item-title'>Lade News...</div></div>";

  try {
    const res = await fetch("/api/news");
    const news = await res.json();

    renderNews(news);

  } catch (err) {
    container.innerHTML = "<div class='list-item'><div class='list-item-title'>Fehler beim Laden.</div></div>";
  }
}

function renderNews(news) {
  const container = document.getElementById("news-list");
  const activeCat = document.querySelector(".category-btn.active").dataset.cat;

  const filtered = news.filter(n => {
    if (activeCat === "all") return true;
    return n.category === activeCat;
  });

  if (!filtered.length) {
    container.innerHTML = "<div class='list-item'><div class='list-item-title'>Keine News verfügbar.</div></div>";
    return;
  }

  let html = "";
  filtered.forEach(item => {
    html += `
      <div class="list-item">
        <div class="list-item-title">${item.title}</div>
        <div class="list-item-meta">${new Date(item.date).toLocaleDateString("de-DE")}</div>
        <div class="list-item-desc">${item.description}</div>
        <a href="${item.link}" target="_blank" class="btn-primary" style="margin-top:10px;">Weiterlesen</a>
      </div>
    `;
  });

  container.innerHTML = html;
}

document.addEventListener("DOMContentLoaded", () => {
  loadNews();

  document.querySelectorAll(".category-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".category-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      loadNews();
    });
  });
});
</script>

<!-- VISUELLER TICKER -->
<script>
async function loadTicker() {
  const container = document.getElementById("ticker-content");
  container.innerHTML = "<div class='ticker-item'>Lade News...</div>";

  try {
    const res = await fetch("/api/news");
    const news = await res.json();

    if (!news.length) {
      container.innerHTML = "<div class='ticker-item'>Keine News verfügbar</div>";
      return;
    }

    let html = "";
    news.forEach(n => {
      html += `
        <div class="ticker-item">
          <div class="ticker-cat">${n.category || "News"}</div>
          <div class="ticker-title">${n.title}</div>
          <div class="ticker-date">${new Date(n.date).toLocaleDateString("de-DE")}</div>
        </div>
      `;
    });

    container.innerHTML = html;

  } catch (err) {
    container.innerHTML = "<div class='ticker-item'>Fehler beim Laden</div>";
  }
}

document.addEventListener("DOMContentLoaded", loadTicker);
</script>

</body>
</html>
